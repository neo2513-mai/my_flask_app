้<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Peemai Store - รายการสินค้า</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
   
</head>
<body>
    
        <div class="row">
    {% for item in products %}
    <div class="col-md-4">
        <div class="card mb-4">
            <img src="{{ item.Image }}" class="card-img-top" alt="{{ item.name }}">
            <div class="card-body">
                <h5 class="card-title">{{ item.name }}</h5>
                <p class="card-text">ราคา: {{ item.price }} บาท</p>
                <button class="btn btn-primary" 
                        onclick="showDetail('{{ item.name }}', '{{ item.Image }}', '{{ item.collection }}', '{{ item.description }}')">
                    ดูรายละเอียด
                </button>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable"> <div class="modal-content">
      
      <div class="modal-header border-0">
        <h5 class="modal-title" id="productModalLabel">รายละเอียดสินค้า</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div id="modalBody" class="modal-body text-center">
          <img id="modalImg" src="" class="img-fluid rounded mb-3" style="max-height: 400px; object-fit: cover;">
          <h3 id="modalName" class="fw-bold"></h3>
          
          <div id="collectionContainer" class="mb-3">
             <img id="modalCollectionImg" src="" class="img-fluid rounded shadow-sm">
          </div>

          <p id="modalDesc" class="text-start px-3" style="white-space: pre-wrap;"></p>
          
          <div class="d-grid gap-2 px-3 mt-4">
            <a id="lineBtn" href="https://line.me/ti/p/~@peemai01_shop" target="_blank" class="btn btn-success btn-lg">
                <i class="bi bi-line"></i> สั่งซื้อผ่าน Line
            </a>
            
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">ปิดหน้าต่างนี้</button>
          </div>
      </div>

    </div>
  </div>
</div>



 <script>

      function showDetail(name, img, collection, desc) {
    document.getElementById('modalName').innerText = name;
    document.getElementById('modalImg').src = img;
    document.getElementById('modalCollectionImg').src = collection; // เพิ่มบรรทัดนี้
    document.getElementById('modalDesc').innerText = desc;
    
    var myModal = new bootstrap.Modal(document.getElementById('productModal'));
    myModal.show();

}

 </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
 
</body>
</html>
